<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Pandit Login - PujaConnect</title>

  <link rel="stylesheet" href="css/style.css">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
</head>
<body>

<div class="auth-container">

  <form class="auth-form" id="panditLoginForm">

    <div class="auth-icon">

      <i class="fas fa-user-tie"></i>

    </div>

    <h2>Pandit Login</h2>

    <p>
      Login to manage your puja bookings
    </p>

    <input
      type="email"
      id="email"
      placeholder="Enter Email"
      required
    >

    <input
      type="password"
      id="password"
      placeholder="Enter Password"
      required
    >

    <button type="submit">

      Login

    </button>

    <div class="auth-links">

      <a href="pandit-register.html">
        Register as Pandit
      </a>

      <a href="index.html">
        Back to Home
      </a>

    </div>

  </form>

</div>

<script src="js/pandit-login.js"></script>

</body>
</html>
