<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Pandit Registration</title>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

<form id="panditForm" class="form">

<h2>Pandit Registration</h2>

<input type="text" id="name" placeholder="Full Name" required>

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Password" required>

<input type="text" id="phone" placeholder="Phone Number">

<input type="text" id="location" placeholder="Location">

<input type="text" id="experience" placeholder="Experience">

<input type="text" id="languages" placeholder="Languages">

<input type="text" id="rituals" placeholder="Supported Rituals">

<input type="text" id="pricing" placeholder="Pricing">

<textarea id="bio" placeholder="Short Bio"></textarea>

<button type="submit">
Register
</button>

</form>

</div>

<script src="js/pandit-register.js"></script>

</body>
</html>
